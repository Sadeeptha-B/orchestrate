# Cloudflare Pages project configuration.
#
# This app is a Vite SPA (static assets in `dist/`) plus Pages Functions under
# `functions/` that implement the Google Calendar OAuth flow (auth-code exchange
# with a server-held refresh token). Build with `npm run build`; Cloudflare serves
# `dist/` and auto-bundles `functions/`.
#
# Secrets are NOT stored here — set them in the Cloudflare dashboard
# (Settings → Environment variables / Secrets) or via the CLI, e.g.:
#   npx wrangler pages secret put GOOGLE_CLIENT_ID
#   npx wrangler pages secret put GOOGLE_CLIENT_SECRET
#   npx wrangler pages secret put OAUTH_STATE_SECRET
#   npx wrangler pages secret put CF_ACCESS_AUD
# Plaintext vars: CF_ACCESS_TEAM_DOMAIN (Zero Trust team domain — the whole origin sits
# behind a Cloudflare Access application; Functions verify the Access JWT per request),
# and optionally APP_ORIGIN = "https://orchestrate.example.com" (defaults to the request
# origin). Local dev uses .dev.vars with DEV_USER_EMAIL instead of Access — see
# docs/deployment.md Part E.

name = "orchestrate"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

[vars]
APP_ORIGIN = "https://orchestrate-3gq.pages.dev"
CF_ACCESS_TEAM_DOMAIN = "solitary-dust-4e42.cloudflareaccess.com"

# KV namespace that stores each user's Google refresh token + cached access token and
# Todoist token, keyed per Access identity (user:<email>:…). Create it once and paste
# the id below:
#   npx wrangler kv namespace create OAUTH_KV
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "bea5f764eb0e422798cef203dee4f481"

# D1 database holding the synced state slices (see functions/api/state/*). This is
# the cloud mirror of the localStorage working store — one row per user per slice,
# last-write-wins. Create it once and paste the id below, then apply the schema
# (local + remote; migrating a pre-multi-user DB: db/migrate_add_user_id.sql):
#   npx wrangler d1 create orchestrate-sync
#   npx wrangler d1 execute orchestrate-sync --remote --file db/schema.sql
#   npx wrangler d1 execute orchestrate-sync --local  --file db/schema.sql
[[d1_databases]]
binding = "SYNC_DB"
database_name = "orchestrate-sync"
database_id = "be40205a-95cf-4fc0-96b0-411948847100"

